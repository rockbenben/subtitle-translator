# Cross-platform Tauri build with signing, a draft release carrying latest.json,
# and a portable Windows exe.
#
# Secrets required for auto-update: TAURI_SIGNING_PRIVATE_KEY (+ _PASSWORD if the key
# has one — ours has none). GITHUB_TOKEN is built in. The release is a DRAFT —
# un-draft it to actually roll the update out (releases/latest ignores drafts, gotcha #6).
#
# The pushed tag MUST equal package.json version (v3.0.0 <-> "version": "3.0.0"):
# tauri-action expands __VERSION__ from the app version and the portable-exe step
# uploads to v${APP_VERSION}; a mismatch silently breaks the portable upload.
name: Build Desktop App

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # Intel
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libgtk-3-dev wget file

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*
          cache: yarn

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: |
          yarn update-version
          yarn install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Subtitle Translator v__VERSION__"
          releaseBody: "See the assets to download and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Portable "green" exe (Windows only): the raw self-contained binary tauri
      # builds anyway. No installer; needs the WebView2 runtime; does NOT self-update.
      - name: Stage portable Windows exe
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp "src-tauri/target/release/SubtitleTranslator.exe" "SubtitleTranslator_${VERSION}_portable.exe"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Upload portable exe as workflow artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: portable-windows
          path: SubtitleTranslator_${{ env.APP_VERSION }}_portable.exe
          if-no-files-found: error

      - name: Attach portable exe to the release
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${APP_VERSION}" "SubtitleTranslator_${APP_VERSION}_portable.exe" --clobber
